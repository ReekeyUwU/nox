<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>reekey & nox | Live-Stats Ultimate </title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/stats.css">
</head>
<body class="theme-reekey" id="body-context">

    <div id="pw-overlay">
        <div class="login-box" id="login-card">
            <h2><i class="fa-solid fa-shield-halved" style="margin-right:8px; color: var(--primary);"></i>Live-Stats Pro</h2>
            <p>Bitte gib dein Administrations-Passwort ein</p>
            <div>
                <select class="user-select" id="pre-login-account" style="margin-bottom: 4px;">
                    <option value="reekey">Reekey.de</option>
                    <option value="nox">Nox.contact</option>
                    <option value="dejaykey">DeJay</option>
                </select>
                <input type="password" id="pw-input" placeholder="Passwort eingeben" onkeydown="if(event.key === 'Enter') checkPassword()">
                <div style="color:#ff0055; font-size:12px; display:none; font-weight: 600;" id="login-error"><i class="fa-solid fa-triangle-exclamation"></i> Falsches Passwort!</div>
                <button onclick="checkPassword()" class="login-btn" id="login-submit-btn">Dashboard öffnen</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="detail-modal" onclick="closeModal(event)">
        <div class="modal-box">
            <span class="close-modal" onclick="document.getElementById('detail-modal').style.display='none'">&times;</span>
            <h3 id="modal-title">Link Name</h3>
            <div class="modal-subtitle" id="modal-stats-summary">0 Klicks</div>
            <div class="modal-chart-container"><canvas id="modalChart"></canvas></div>
        </div>
    </div>

    <div class="box" id="stats-content" style="display:none;">
        <div class="header-ui">
            <h1><i class="fa-solid fa-chart-simple" style="margin-right:6px;"></i>Live-Statistiken</h1>
            <select class="user-select" id="account-toggle" onchange="switchAccount()">
                <option value="reekey">Reekey.de</option>
                <option value="nox">Nox.contact</option>
                <option value="dejaykey">DeJay</option>
            </select>
        </div>

        <div class="live-bar"><div class="pulse"></div><span id="live-ticker">Zuletzt aktualisiert: Lade...</span></div>
        <div class="views-header" id="page-views">Gesamt-Aufrufe: Lade...</div>

        <div class="controls-grid">
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="changeFilter('all', this)">Gesamt</button>
                <button class="filter-btn" onclick="changeFilter('90d', this)">90 Tage</button>
                <button class="filter-btn" onclick="changeFilter('30d', this)">30 Tage</button>
                <button class="filter-btn" onclick="changeFilter('7d', this)">7 Tage</button>
                <button class="filter-btn" onclick="changeFilter('1d', this)">Heute</button>
            </div>
            <div class="search-container"><i class="fa-solid fa-magnifying-glass"></i><input type="text" class="search-input" id="search-bar" placeholder="Links filtern..."></div>
        </div>

        <div class="chart-container"><canvas id="statsChart"></canvas></div>
        <div class="stats-list" id="stats-container">Lade Daten...</div>

        <div class="cms-section" style="border-top: 1px dashed rgba(255,255,255,0.1); padding-top:20px; margin-bottom:25px;">
            <div class="cms-title"><i class="fa-solid fa-user-gear"></i> Design & Profiltexte anpassen</div>
            <div class="cms-form">
                <input type="text" id="site-avatar" placeholder="Profilbild URL (Avatar)">
                <input type="text" id="site-title" placeholder="Profilname (Überschrift)">
                <textarea id="site-bio" rows="3" placeholder="Biografie / Beschreibungstext"></textarea>
                <input type="text" id="site-background" placeholder="Hintergrundbild URL">
                <button onclick="saveSiteConfig()" style="padding:10px; border-radius:10px; background:white; color:black;" id="config-save-btn">Design live aktualisieren</button>
            </div>
        </div>

        <div class="cms-section">
            <div class="cms-title"><i class="fa-solid fa-sliders"></i> All-In-One Linkverwaltung</div>
            <div class="cms-form">
                <input type="hidden" id="link-id">
                <div class="form-row">
                  <input type="text" id="link-title" placeholder="Titel (z.B. Instagram)">
                  <select id="link-type" style="max-width: 160px;">
                      <option value="button">Haupt-Button</option>
                      <option value="social">Social Icon (Zeile)</option>
                      <option value="widget">Discord Widget</option>
                  </select>
                </div>
                <input type="text" id="link-url" placeholder="Ziel-URL (https://...)">
                <input type="text" id="link-icon" placeholder="Icon Klasse oder Web-URL (z.B. fab fa-instagram)">
                <div class="form-row" style="justify-content: space-between; align-items: center;">
                    <label class="checkbox-container"><input type="checkbox" id="link-nsfw"> 18+ Warnung vorschalten</label>
                    <input type="number" id="link-order" placeholder="Sortierung" style="max-width: 100px;" value="0">
                </div>
                <button onclick="saveLink()" style="padding: 11px; border-radius: 10px;" id="save-btn">Link speichern</button>
            </div>
            <div id="cms-list-container">Lade Links...</div>
        </div>

        <div class="utility-grid" style="margin-top: 20px;"><button class="sec-btn" onclick="loadStats()">Aktualisieren</button></div>
        <button class="logout-btn" onclick="logout()">Ausloggen</button>
    </div>

    <script src="/stats.js"></script>
</body>
</html>
