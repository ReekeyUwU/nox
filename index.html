<!DOCTYPE html>
  <html lang="de">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Nox | Blu </title>

    <meta property="og:title" content="Nox | Blu">
    <meta property="og:site_name" content="nox.contact">
    <meta property="og:description" content="Hey, schön dass du hergefunden hast. Ich bin Nox, ein 29 jähriger Furry aus Deutschland.">
    <meta property="og:url" content="https://nox.contact/">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <div id="age-gate" class="age-gate-overlay">
      <div class="age-gate-box">
        <div class="icon-circle"><i class="fa-solid fa-triangle-exclamation"></i></div>
        <h2>Confirm Age</h2>
        <p>This content is restricted to 18+. Are you old enough to continue?</p>
        <div class="age-gate-actions">
          <button onclick="go()" class="yes-btn">Yes (18+)</button>
          <button onclick="hide()" class="no-btn">Close</button>
        </div>
      </div>
    </div>

    <div class="bg-layer" id="live-bg"></div>
    <div class="main-wrapper">
      <div class="profile-card" id="card">
        <div>
          <div class="avatar-box">
            <img id="avatar" class="avatar-img" src="">
            <div class="avatar-ring"></div>
            <div class="status-corner"><i class="fa-solid fa-check"></i></div>
          </div>
        </div>
        <div>
          <h1 id="live-title"></h1>
          <div class="sub-bio" id="live-bio"></div>
        </div>

        <div id="dynamic-widget-area"></div>

        <div class="social-row" id="dynamic-social-container"></div>

        <div class="btn-list" id="dynamic-links-container"></div>

        <div class="footer">
          <div class="footer-links">
            <span class="view-counter-box">👁 <span id="view-count">...</span></span>
            <span>·</span>
            <span><a href="https://reekey.de">reekey.de</a></span>
          </div>
          <div class="footer-made-by">
            © 2026 — made with ❤️ from <a href="https://reekey.de">reekey.de</a>
        </div>
      </div>
    </div>
  </div>

  <script src="/script.js"></script>
</body>
</html>
