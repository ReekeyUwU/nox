<!DOCTYPE html>
<html lang="de">
<head>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    :root {
      --baby-blue: #87CEEB;
      --accent: #E6E6FA;
      --bg-dark: #0f172a;
      --card-bg: rgba(135, 206, 235, 0.1);
    }

    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; width: 100%; min-height: 100vh; background-color: var(--bg-dark); color: var(--accent); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow-x: hidden; }
    
    .bg-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); z-index: 1; }
    
    .main-wrapper { position: relative; z-index: 2; min-height: 100vh; width: 100%; display: flex; justify-content: center; align-items: center; padding: 20px; }
    
    .profile-card { 
        width: 100%; max-width: 640px; 
        background: var(--card-bg); backdrop-filter: blur(12px); 
        border-radius: 25px; border: 1px solid rgba(135, 206, 235, 0.2); 
        padding: 40px; text-align: center; position: relative; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        animation: slideUp 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .avatar-img { width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 3px solid var(--baby-blue); margin-bottom: 20px; }
    
    h1 { font-size: 36px; color: var(--baby-blue); margin: 0 0 10px 0; }
    .sub-bio { color: var(--accent); font-size: 15px; margin-bottom: 25px; line-height: 1.6; opacity: 0.9; }
    
    .guns-discord-widget { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 12px 20px; margin: 0 auto 25px auto; width: 100%; max-width: 310px; display: flex; align-items: center; border: 1px solid var(--baby-blue); cursor: pointer; }
    .widget-status-dot { width: 12px; height: 12px; border-radius: 50%; background-color: #747f8d; position: absolute; bottom: 0; right: 0; border: 2px solid var(--bg-dark); }
    
    .social-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; }
    .social-icon { width: 45px; height: 45px; background: rgba(135, 206, 235, 0.1); border-radius: 50%; display: flex; justify-content: center; align-items: center; color: var(--baby-blue); text-decoration: none; transition: 0.3s; }
    .social-icon:hover { background: var(--baby-blue); color: var(--bg-dark); }
    
    .links-card { background: rgba(255,255,255,0.05); border: 1px solid var(--baby-blue); padding: 15px 25px; border-radius: 15px; color: var(--accent); text-decoration: none !important; font-weight: 500; display: flex; justify-content: space-between; cursor: pointer; margin-bottom: 12px; transition: 0.3s; }
    .links-card:hover { background: var(--baby-blue); color: var(--bg-dark); }
    
    .badge-18 { font-size: 10px; background: var(--baby-blue); color: var(--bg-dark); padding: 2px 8px; border-radius: 10px; font-weight: bold; }
    
    .age-gate-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.9); z-index: 9999; display: none; justify-content: center; align-items: center; }
    .age-gate-box { background: var(--bg-dark); border: 2px solid var(--baby-blue); border-radius: 20px; padding: 40px; text-align: center; }
  </style>
</head>
<body>

  <div id="age-gate" class="age-gate-overlay">
    <div class="age-gate-box">
      <h2 style="color:var(--accent); margin-bottom: 20px;">Confirm Age</h2>
      <button onclick="go()" style="padding:12px 30px; border-radius:20px; background:var(--baby-blue); border:none; font-weight:bold; cursor:pointer;">Yes (18+)</button>
    </div>
  </div>

  <div class="bg-layer"></div>
  <div class="main-wrapper">
    <div class="profile-card">
      <img class="avatar-img" src="https://r2.guns.lol/315ca1f2-f200-4a1c-863b-e412a4d7903c.webp">
      <h1>reekey</h1>
      <div class="sub-bio">Hey, schön dass du hergefunden hast. Ich bin Nox, ein 28 jähriger Furry aus Deutschland.</div>
      
      <div class="guns-discord-widget" onclick="window.open('https://discord.com/users/1104903295438434365', '_blank')">
        <div style="position:relative;">
            <img style="width:40px; height:40px; border-radius:50%; border:2px solid var(--baby-blue);" src="https://r2.guns.lol/315ca1f2-f200-4a1c-863b-e412a4d7903c.webp">
            <div id="widget-dot" class="widget-status-dot"></div>
        </div>
        <div style="color:var(--accent); text-align:left; margin-left:15px;">
            <div style="font-weight:700;">reekey_</div>
            <div id="widget-activity" style="font-size:11px; opacity:0.8;">Status</div>
        </div>
      </div>
      
      <div class="social-row">
        <a class="social-icon" href="https://discord.com/invite/nRTbXGepUT"><i class="fab fa-discord"></i></a>
        <a class="social-icon" href="https://instagram.com/reekeyuwu"><i class="fab fa-instagram"></i></a>
        <a class="social-icon" href="https://tiktok.com/@reekey"><i class="fab fa-tiktok"></i></a>
        <a class="social-icon" href="https://bsky.app/profile/reekey.de"><i class="fa-solid fa-cloud"></i></a>
      </div>
      
      <div class="btn-list">
        <div class="links-card" onclick="gate('https://onlyfans.com/reekeyuwu')">
            <span>OnlyFans</span><span class="badge-18">18+</span>
        </div>
        <a href="https://x.com/Protogen_Nox" class="links-card"><span>X (Twitter)</span></a>
        <div class="links-card" onclick="gate('https://t.me/s/reekeyad')">
            <span>Telegram Channel</span><span class="badge-18">18+</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    let url = "";
    function gate(u) { url = u; document.getElementById('age-gate').style.display='flex'; }
    function go() { window.open(url, '_blank'); document.getElementById('age-gate').style.display='none'; }
    
    async function updateStatus() {
        const res = await fetch('https://api.lanyard.rest/v1/users/1104903295438434365');
        const data = await res.json();
        if (data.success) {
            const s = data.data.discord_status;
            const dot = document.getElementById('widget-dot');
            const text = document.getElementById('widget-activity');
            const colors = { 'online': '#43b581', 'idle': '#faa61a', 'dnd': '#f04747', 'offline': '#747f8d' };
            dot.style.backgroundColor = colors[s] || '#747f8d';
            text.innerText = s.charAt(0).toUpperCase() + s.slice(1);
        }
    }
    updateStatus();
    setInterval(updateStatus, 15000);
  </script>
</body>
</html>
