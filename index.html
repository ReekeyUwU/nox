<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <meta property="og:title" content="Nox | Blu | Welcome to my universe">

  <meta property="og:image" content="https://nox.contact/1_1767471992.jpg">

  <link rel="icon" type="image/webp" href="https://nox.contact/1_1767471992.jpg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
  <style>
    :root {
      --primary: #4682B4;    
      --accent: #B0C4DE;     
      --bg: #050505;
      --card-bg: rgba(20, 30, 45, 0.7); 
    }

    * { box-sizing: border-box; }
    body, html { margin: 0; padding: 0; width: 100%; min-height: 100vh; background-color: var(--bg); color: var(--primary); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow-x: hidden; }
    
    .bg-layer { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background-image: url("https://i.postimg.cc/SKP6r9x0/photo-2026-02-23-17-08-37.jpg"); 
        background-size: cover; background-position: center; z-index: 1; 
        filter: brightness(0.4); 
    }
    
    .main-wrapper { position: relative; z-index: 2; min-height: 100vh; width: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
    
    .profile-card { 
        width: 100%; max-width: 640px; 
        background: var(--card-bg); backdrop-filter: blur(10px); 
        border-radius: 20px; border: 1px solid rgba(70, 130, 180, 0.3); 
        padding: 35px 25px 50px 25px; text-align: center; position: relative; 
        box-shadow: 0 0 30px rgba(0,0,0,0.8);
        animation: slideUp 1s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }
    @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    
    .avatar-box { width: 130px; height: 130px; margin: 0 auto 20px auto; position: relative; }
    .avatar-img { width: 130px; height: 130px; border-radius: 35px; object-fit: cover; border: 3px solid var(--primary); }
    
    h1 { font-size: 39.5px; font-weight: 600; margin: 0 0 5px 0; color: var(--primary); display: inline-flex; align-items: center; gap: 8px; }
    .sub-bio { color: var(--accent); font-size: 16px; margin: 5px 0 20px 0; }

    .guns-discord-widget { background: rgba(0, 0, 0, 0.5); border-radius: 20px; padding: 12px 20px; margin: 0 auto 25px auto; width: 100%; max-width: 310px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--primary); transition: 0.3s; cursor: pointer; }
    .widget-status-dot { width: 14px; height: 14px; border-radius: 50%; background-color: #747f8d; border: 3px solid #111; position: absolute; bottom: -2px; right: -2px; }
    
    .social-row { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; }
    .social-icon { width: 42px; height: 42px; background: rgba(70, 130, 180, 0.2); border: 1px solid rgba(70, 130, 180, 0.3); border-radius: 50%; display: flex; justify-content: center; align-items: center; text-decoration: none; cursor: pointer; transition: 0.3s; color: var(--primary); overflow: hidden; }
    .social-icon img { width: 22px; height: 22px; object-fit: contain; }
    .social-icon:hover { background: var(--primary); color: white; transform: scale(1.1); }
    
    .btn-list { display: flex; flex-direction: column; gap: 15px; width: 100%; }
    .links-card { background: rgba(70, 130, 180, 0.1); border: 1px solid rgba(70, 130, 180, 0.3); padding: 18px 30px; border-radius: 12px; color: var(--primary); text-decoration: none !important; font-weight: 600; font-size: 17px; display: flex; justify-content: space-between; cursor: pointer; align-items: center; margin-bottom: 15px; transition: all 0.3s ease; }
    .links-card:hover { background: rgba(70, 130, 180, 0.3); border-color: var(--primary); transform: scale(1.02); }
    
    .badge-18 { font-size: 11px; background: rgba(70, 130, 180, 0.4); color: white; padding: 2px 6px; border-radius: 6px; margin-left: 8px; }
    .age-gate-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); z-index: 9999; display: none; justify-content: center; align-items: center; }
    .age-gate-box { background: #111; border: 1px solid var(--primary); border-radius: 20px; padding: 40px; text-align: center; }
    
    .footer { margin-top: 25px; color: var(--accent); font-size: 14px; text-align: center; }
    .footer a { color: var(--primary); text-decoration: none; font-weight: bold; }
    .view-counter-box { background: rgba(70, 130, 180, 0.2); padding: 5px 12px; border-radius: 8px; color: var(--primary); font-weight: bold; border: 1px solid rgba(70, 130, 180, 0.3); margin-bottom: 10px; display: inline-block; }
  </style>
</head>
<body>

  <script src="https://unpkg.com/shimeji-js"></script>
  <script>
    window.onload = function() { new Shimeji({ directory: 'https://unpkg.com/shimeji-js/assets/', sprite: 'cat' }); };
  </script>

  <div id="age-gate" class="age-gate-overlay">
    <div class="age-gate-box">
      <h2 style="color:white; margin-bottom: 20px;">Confirm Age</h2>
      <button onclick="go()" style="padding:12px 35px; border-radius:30px; background:var(--primary); border:none; color:white; font-weight:bold; cursor:pointer;">Yes (18+)</button>
      <button onclick="hide()" style="padding:12px 35px; border-radius:30px; background:transparent; color:white; border:1px solid var(--primary); cursor:pointer; margin-left:10px;">Close</button>
    </div>
  </div>

  <div class="bg-layer"></div>
  <div class="main-wrapper">
    <div class="profile-card">
      <div class="avatar-box"><img id="avatar" class="avatar-img" src="https://nox.contact/1_1767471992.jpg"></div>
      <h1>Nox | Blu<i class="fa-solid fa-circle-check" style="font-size:20px;"></i></h1>
      <div class="sub-bio">Hey, schön dass du hergefunden hast. Ich bin Nox, ein 29 jähriger Furry aus Deutschland.</div>

      <div class="guns-discord-widget" onclick="track('Discord_Profile', 'https://discord.com/users/324617277393600513')">
        <div style="position:relative;">
            <img style="width:45px; height:45px; border-radius:50%; object-fit:cover; border:2px solid var(--primary);" src="https://nox.contact/1_1767471992.jpg">
            <div id="widget-dot" class="widget-status-dot"></div>
        </div>
        <div style="color:white; text-align:left; margin-left:15px;">
            <div style="font-weight:700;">Nox | Blu</div>
            <div id="widget-activity" style="color:var(--primary); font-size:12px; font-weight:600;">Status</div>
        </div>
      </div>
      
      <div class="social-row">
        <a class="social-icon" onclick="track('Discord_Invite', 'https://discord.com/invite/nRTbXGepUT')"><i class="fab fa-discord"></i></a>
        <a class="social-icon" onclick="track('Instagram', 'https://www.instagram.com/protogen_nox/')"><i class="fab fa-instagram"></i></a>
        <a class="social-icon" onclick="track('Bluesky', 'http://protogennox.bsky.social/')"><img src="https://cdn.simpleicons.org/bluesky" alt="Bluesky"></a>
        <a class="social-icon" onclick="track('Telegram', 'https://t.me/Protogen_Nox')"><i class="fab fa-telegram"></i></a>
        <a class="social-icon" onclick="track('X_Twitter', 'https://x.com/Protogen_Nox')"><i class="fab fa-x-twitter"></i></a>
        <a class="social-icon" onclick="gate('https://t.me/reekeyad', 'Telegram_Channel_Ads')"><i class="fab fa-telegram" style="color:white;"></i></a>
        <a class="social-icon" onclick="track('Barq', 'https://barq.app/p/P2UtElI')"><img src="https://r2.guns.lol/12468df9-0fa2-4803-9eff-17382fc79a12.webp" alt="Barq"></a>
      </div>
      
      <div class="btn-list">
        <div class="links-card" onclick="gate('https://onlyfans.com/blu_ad', 'OnlyFans')">
            <span style="display:flex; align-items:center;"><img src="https://cdn.simpleicons.org/onlyfans" style="width:20px; margin-right:12px;">OnlyFans</span><span class="badge-18">18+</span>
        </div>
        <div class="links-card" onclick="gate('https://x.com/horny_nox', 'Twitter_NSFW')">
            <span style="display:flex; align-items:center;"><i class="fab fa-x-twitter" style="margin-right:12px;"></i>Twitter</span><span class="badge-18">18+</span>
        </div>
        <div class="links-card" onclick="gate('https://t.me/+QHoqYArIYVtlOWJi', 'Telegram_Channel')">
            <span style="display:flex; align-items:center;"><i class="fab fa-telegram" style="margin-right:12px;"></i>Telegram Channel</span><span class="badge-18">18+</span>
        </div>
        <div class="links-card" onclick="gate('https://murrtube.net/horny_nox', 'Murrtube')">
            <span style="display:flex; align-items:center;"><img src="https://nox.contact/993726981.png" style="width:20px; margin-right:12px;">Murrtube</span><span class="badge-18">18+</span>
        </div>
      </div>
      
      <div class="footer">
        <div class="view-counter-box">Besucher: <span id="view-count">...</span></div><br>
        made with ❤️ from <a href="https://Reekey.de">Reekey.de</a>
      </div>
    </div>
  </div>

  <script>
    let url = "";
    const TRACKER_URL = 'https://link-tracker2.morning-surf-02e1.workers.dev/';

    function track(name, u) { 
      fetch(TRACKER_URL, { method: 'POST', body: JSON.stringify({ link: name }) }); 
      if (u) window.open(u, '_blank'); 
    }
    
    function gate(u, name) { 
      url = u; 
      fetch(TRACKER_URL, { method: 'POST', body: JSON.stringify({ link: name }) }); 
      document.getElementById('age-gate').style.display='flex'; 
    }
    
    function hide() { document.getElementById('age-gate').style.display='none'; }
    function go() { window.open(url, '_blank'); hide(); }
    
    // Zähler laden
    fetch('https://holy-hall-8bc5.morning-surf-02e1.workers.dev/')
      .then(response => response.text())
      .then(data => { document.getElementById('view-count').innerText = data; })
      .catch(err => { console.error('Counter error', err); });
    
    async function updateStatus() {
        try {
            const res = await fetch('https://api.lanyard.rest/v1/users/324617277393600513');
            const json = await res.json();
            if (json.success) {
                const d = json.data;
                const dot = document.getElementById('widget-dot');
                const text = document.getElementById('widget-activity');
                
                const colors = { 'online': '#43b581', 'idle': '#faa61a', 'dnd': '#f04747', 'offline': '#747f8d' };
                if(dot) dot.style.backgroundColor = colors[d.discord_status] || '#747f8d';
                
                if (d.spotify) {
                    text.innerText = `🎵 ${d.spotify.song} – ${d.spotify.artist}`;
                } else {
                    const game = d.activities.find(a => a.type === 0);
                    if (game) {
                        text.innerText = `🎮 ${game.name}`;
                    } else {
                        text.innerText = d.discord_status.charAt(0).toUpperCase() + d.discord_status.slice(1);
                    }
                }
            }
        } catch(e) { console.error("Lanyard-Fehler:", e); }
    }
    
    updateStatus();
    setInterval(updateStatus, 10000);
  </script>
</body>
